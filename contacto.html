<body>

    <!-- ========== MISMO MENÚ que en index.html ========== -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Mi Portafolio</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="contacto.html">Contacto</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ========== CONTENIDO PRINCIPAL ========== -->
    <div class="container py-5">
        <div class="row">
            <div class="col-lg-6 mx-auto">
                <h1 class="text-center mb-4">Contáctame</h1>
                <p class="text-center mb-5">¿Interesado en trabajar conmigo? Escríbeme.</p>
                
                <!-- Formulario de contacto (Nota: GitHub Pages NO procesa formularios automáticamente) -->
                <form action="#" method="post">
                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre</label>
                        <input type="text" class="form-control" id="nombre" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Correo electrónico</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="mensaje" class="form-label">Mensaje</label>
                        <textarea class="form-control" id="mensaje" rows="5" required></textarea>
                    </div>
                    <div class="text-center">
                        <button type="submit" class="btn btn-primary btn-lg">Enviar mensaje</button>
                    </div>
                </form>
                
                <hr class="my-5">
                
                <div class="text-center">
                    <p><strong>Email:</strong> <a href="mailto:[email protected]">[email protected]</a></p>
                    <p><strong>Teléfono / WhatsApp:</strong> +56 9 XXXX XXXX</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== PIE DE PÁGINA ========== -->
